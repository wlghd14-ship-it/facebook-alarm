name: Facebook to Telegram Notifier

on:
  schedule:
    - cron: '*/10 * * * *' # 10분마다 실행
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:                # 💡 추가됨: 로봇에게 파일 저장(쓰기) 권한 부여
      contents: write           

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4 # 💡 최신 버전으로 변경됨

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5 # 💡 최신 버전으로 변경됨
      with:
        python-version: '3.10'

    - name: 필요 패키지 설치
      run: pip install -r requirements.txt

    - name: 파이썬 스크립트 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: 업데이트된 파일(last_links.json) 깃허브에 다시 저장
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add last_links.json
        git commit -m "Update last read posts" || echo "No changes to commit"
        git push
